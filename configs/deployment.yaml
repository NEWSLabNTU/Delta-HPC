# configs/deployment.yaml
#
# Static deployment configuration for the physical cluster.
# Defines which RL agent "owns" each GPU at startup, and tunable vLLM parameters.

# Which simulation agent is initially assigned to each physical GPU.
# Keys are GPU indices (int); values must match agent names in simulation_config.yaml.
gpu_assignment:
  0: CodingAgent
  1: RAGAgent

vllm:
  # First port allocated to vLLM containers.  Ports are assigned sequentially:
  #   slot 0 → base_port, slot 1 → base_port+1, …
  base_port: 8100

  # Path (relative to repo root) to the launch helper script.
  script: scripts/launch_vllm.sh

  # Path (relative to repo root) to the docker-compose file.
  compose_file: docker-compose.yaml

  # Seconds to wait for a freshly started container to pass its /health check.
  health_timeout_s: 600

  # HTTP request timeout in seconds when calling vLLM inference or metrics endpoints.
  request_timeout_s: 120

# Simulated GPUs (e.g. for permanent engines when extra hardware is missing).
# Maps GPU index to its simulated hardware model and permanent engine list.
simulated_gpus:
  2:
    model: A100_40GB
    state_id: 8
    permanent_engines:
      - agent: CodingAgent
        mig: 2g.10gb
      - agent: RAGAgent
        mig: 2g.10gb
