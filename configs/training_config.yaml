training:
  phase: 1
  action-interval: 120.0 # seconds
  arrival_rate_history_length: 5
  normalization:
    current_budget: 150.0
    total_sm_ratio: 7.0
    total_vram_ratio: 40.0
    mig_geometry: 7.0
    last_action: 5.0
    vram_transfer_amount: 20.0
    avg_queue_length_exp_max: 100.0
    avg_running_requests: 10.0
    queue_length_trend_clamp: 3.0
    default_waiting_qj: 10.0
  PPO:
    episode_length: 1024
    n_steps: 256
    lr_max: 3.0e-4
    lr_min: 5.0e-5
    batch_size: 64
    n_epochs: 15
    gamma: 0.995
    gae_lambda: 0.90
    clip_range: 0.2
    ent_coef: 0.01
    net_arch:
      pi: [128, 128]
      vf: [2048, 1024, 512]
  action_mask:
    split_merge_cooldown_steps: 5
  patterns:
    busy:
      duration: [2400.0, 3600.0]
      rate:
        CodingAgent: [4.0, 5.0]
        RAGAgent: [6.0, 7.0]
    idle:
      duration: [2400.0, 3600.0]
      rate:
        CodingAgent: [0.1, 0.5]
        RAGAgent: [0.5, 2.0]
    balanced:
      duration: [3600.0, 5400.0]
      rate:
        CodingAgent: [1.0, 2.0]
        RAGAgent: [2.0, 3.0]
  reconfig:
    budget: 150.0 # seconds
    refresh: 15.0 # minutes
  reward:
    # Reward function:
    # R_t = -\left( \sum_{k \in \text{Agents}} \left[ \frac{\alpha_k \cdot \overline{\Psi}(L_k)}{Q_k} \right] + \Omega(a_t) \right)
    # \overline{\Psi}(L_k) = \frac{1}{|\text{Req}_k| + \epsilon} \sum_{j \in \text{Req}_k} \left[ w_{T} \cdot \text{TTFT}_j + w_{P} \cdot \text{TPOT}_j \right]
    Q: # quality-incentive factor
      7g.40gb: 7.0
      4g.20gb: 3.0
      3g.20gb: 3.0
      2g.10gb: 1.0
      1g.10gb: 1.0
    alpha:
      CodingAgent: 1.1
      RAGAgent: 1.0
    w_ttft: 0.8 # weight in latency penalty
    w_tpot: 0.2 # weight in latency penalty
    gamma: 3.5 # reconfiguration penalty
    clipping: -300.0
