training:
  tmux_session: hpc-train-3ag-b200
  sb3_norm: true
  action-interval: 120.0
  total_timesteps: 1024000
  arrival_rate_history_length: 5
  normalization:
    total_sm_ratio: 7.0
    total_vram_ratio: 40.0
    mig_geometry: 7.0
    vram_transfer_amount: 20.0
    arrival_rate: 10.0
    avg_queue_length: 10.0
    avg_running_requests: 100.0
    avg_composite_latency: 5.0
    queue_length_trend_clamp: 3.0
    default_waiting_qj: 1.0
  PPO:
    episode_length: 1024
    n_steps: 2048
    lr_max: 3e-4
    lr_min: 5e-5
    batch_size: 256
    n_epochs: 10
    gamma: 0.995
    gae_lambda: 0.9
    clip_range: 0.2
    ent_coef_schd: true
    ent_coef: 0.01
    min_ent_coef: 0.005
    max_ent_coef: 0.03
    net_arch:
      pi:
        - 512
        - 512
      vf:
        - 512
        - 512
  action_mask:
    action_cooldown: 10
  patterns:
    idle:
      duration:
        - 3600.0
        - 4800.0
      rate:
        CodingAgent:
          - 0.2
          - 0.5
        RAGAgent:
          - 0.1
          - 0.5
        ChatAgent:
          - 0.1
          - 0.5
    even:
      duration:
        - 1800.0
        - 2200.0
      rate:
        CodingAgent:
          - 1.0
          - 2.5
        RAGAgent:
          - 1.0
          - 2.0
        ChatAgent:
          - 1.0
          - 2.0
    busy:
      duration:
        - 1800.0
        - 2200.0
      rate:
        CodingAgent:
          - 3.0
          - 4.0
        RAGAgent:
          - 4.5
          - 5.5
        ChatAgent:
          - 4.5
          - 5.5
    burst:
      duration:
        - 300.0
        - 700.0
      rate:
        CodingAgent:
          - 4.0
          - 5.0
        RAGAgent:
          - 6.0
          - 8.0
        ChatAgent:
          - 6.0
          - 8.0
  reconfig:
    budget: 300.0
    refresh: 30.0
  reward:
    Q:
      CodingAgent:
        7g.40gb: 15.0
        4g.20gb: 5.0
        3g.20gb: 5.0
        2g.10gb: 1.0
        1g.10gb: 1.0
        7g.180gb: 18.0
        4g.90gb: 5.0
        3g.90gb: 5.0
        2g.45gb: 1.0
        1g.45gb: 1.0
        1g.23gb: 1.0
      RAGAgent:
        7g.40gb: 15.0
        4g.20gb: 5.0
        3g.20gb: 5.0
        2g.10gb: 1.0
        1g.10gb: 1.0
        7g.180gb: 18.0
        4g.90gb: 5.0
        3g.90gb: 5.0
        2g.45gb: 1.0
        1g.45gb: 1.0
        1g.23gb: 1.0
      ChatAgent:
        7g.40gb: 15.0
        4g.20gb: 5.0
        3g.20gb: 5.0
        2g.10gb: 1.0
        1g.10gb: 1.0
        7g.180gb: 18.0
        4g.90gb: 5.0
        3g.90gb: 5.0
        2g.45gb: 1.0
        1g.45gb: 1.0
        1g.23gb: 1.0
    alpha:
      CodingAgent: 1.0
      RAGAgent: 1.0
      ChatAgent: 1.0
    w_ttft: 0.8
    w_tpot: 0.2
    gamma: 12.0
    scaling: 0.1
    clipping: -50
    use_quality_bonus: true
    use_affinity_bonus: true
    affinity_bonus_weight: 0.3
