training:
  cluster:
    0: B200
    1: B200
    2: A100_40GB # 2g.10gb permanent engine
  phase: 2
  tmux_session: "hpc-b200"
  sb3_norm: true
  action-interval: 120.0 # seconds
  total_timesteps: 1024000
  arrival_rate_history_length: 5
  normalization:
    current_budget: 150.0
    total_sm_ratio: 7.0
    total_vram_ratio: 40.0
    mig_geometry: 7.0
    vram_transfer_amount: 20.0
    arrival_rate: 10.0
    avg_queue_length: 10.0
    avg_running_requests: 100.0
    avg_composite_latency: 5.0
    queue_length_trend_clamp: 3.0
    default_waiting_qj: 1.0
  PPO:
    phase_1:
      # vram transfer
      episode_length: 512
      n_steps: 2048
      lr_max: 3e-4
      lr_min: 5e-5
      batch_size: 128
      n_epochs: 20
      gamma: 0.995
      gae_lambda: 0.90
      clip_range: 0.2
      ent_coef_schd: false
      ent_coef: 0.01
      min_ent_coef: 0.01
      max_ent_coef: 0.05
      net_arch:
        pi: [ 512, 512 ]
        vf: [ 512, 512 ]
    phase_2:
      # vram transfer + mig action
      episode_length: 1024
      n_steps: 2048
      lr_max: 3e-4
      lr_min: 5e-5
      batch_size: 256
      n_epochs: 10
      gamma: 0.995
      gae_lambda: 0.90
      clip_range: 0.2
      ent_coef_schd: true
      ent_coef: 0.01
      min_ent_coef: 0.005
      max_ent_coef: 0.05
      net_arch:
        pi: [ 512, 512 ]
        vf: [ 512, 512 ]
  action_mask:
    action_cooldown: 10
  patterns:
    idle:
      duration: [ 3600.0, 4800.0 ]
      rate:
        CodingAgent: [ 0.2, 0.5 ]
        RAGAgent: [ 0.1, 0.5 ]
    even:
      duration: [ 1800.0, 2200.0 ]
      rate:
        CodingAgent: [ 1.0, 2.5 ]
        RAGAgent: [ 1.0, 2.0 ]
    busy:
      duration: [ 1800.0, 2200.0 ]
      rate:
        CodingAgent: [ 3.0, 4.0 ]
        RAGAgent: [ 4.5, 5.5 ]
    burst:
      duration: [ 300.0, 700.0 ] # Short duration (3-6 steps)
      rate:
        CodingAgent: [ 4.0, 5.0 ] # Very high
        RAGAgent: [ 6.0, 8.0 ]
  reconfig:
    budget: 150.0 # seconds
    refresh: 15.0 # minutes
  reward:
    # Reward function:
    # R_t = -\left( \sum_{k \in \text{Agents}} \left[ \frac{\alpha_k \cdot \overline{\Psi}(L_k)}{Q_k} \right] + \Omega(a_t) \right)
    # \overline{\Psi}(L_k) = \frac{1}{|\text{Req}_k| + \epsilon} \sum_{j \in \text{Req}_k} \left[ w_{T} \cdot \text{TTFT}_j + w_{P} \cdot \text{TPOT}_j \right]
    Q:
      CodingAgent:
        7g.40gb: 12.0
        4g.20gb: 5.0
        3g.20gb: 5.0
        2g.10gb: 1.0
        1g.10gb: 1.0
        7g.180gb: 12.0
        4g.90gb: 5.0
        3g.90gb: 5.0
        2g.45gb: 1.0
        1g.45gb: 1.0
        1g.23gb: 1.0
      RAGAgent:
        7g.40gb: 12.0
        4g.20gb: 5.0
        3g.20gb: 5.0
        2g.10gb: 1.0
        1g.10gb: 1.0
        7g.180gb: 12.0
        4g.90gb: 5.0
        3g.90gb: 5.0
        2g.45gb: 1.0
        1g.45gb: 1.0
        1g.23gb: 1.0
    alpha:
      CodingAgent: 1.0
      RAGAgent: 1.0
    w_ttft: 0.8 # weight in latency penalty
    w_tpot: 0.2 # weight in latency penalty
    gamma: 10.0 # reconfiguration penalty
    scaling: 0.1
    clipping: -50
    use_quality_bonus: true
    use_affinity_bonus: true
    affinity_bonus_weight: 0.1
