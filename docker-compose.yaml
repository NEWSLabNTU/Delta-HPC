services:
  vllm-server:
    image: vllm/vllm-openai:latest
    tty: true
    runtime: nvidia
    ipc: host
    ports:
      - "${HOST_PORT}:8000"
    environment:
      - MIG_UUID=${MIG_UUID} # Ensure this is set in your shell or an .env file
      - HF_HOME=/root/.cache/huggingface
      - VLLM_CACHE_ROOT=/root/.cache/vllm
    volumes:
      - ~/.cache:/root/.cache
      - ./configs:/vllm-workspace/configs
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              device_ids: ["${MIG_UUID}"]
              capabilities: [gpu]
    command: --config /vllm-workspace/configs/${MODEL_ID}.yaml
